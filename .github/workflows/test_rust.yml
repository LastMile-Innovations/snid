name: Test Rust

on:
  push:
  pull_request:

jobs:
  test:
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: rust
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-go@v6
        with:
          go-version-file: go/go.mod
      - uses: dtolnay/rust-toolchain@stable
      - name: Generate conformance vectors
        working-directory: conformance/cmd/generate_vectors
        run: go run . --out ../../vectors.json
      - run: cargo test
