name: Nightly Benchmarks

on:
  schedule:
    - cron: '0 0 * * *'  # Daily at midnight UTC
  workflow_dispatch:  # Allow manual trigger
  pull_request:
    types: [opened, synchronize, reopened]
    paths:
      - 'go/**'
      - 'rust/**'
      - 'python/**'
      - 'benchmarks/**'

jobs:
  benchmark:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Set up Go
        uses: actions/setup-go@v5
        with:
          go-version: '1.24'

      - name: Set up Rust
        uses: actions-rs/toolchain@v1
        with:
          toolchain: stable
          override: true

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.12'

      - name: Install Python dependencies
        run: |
          cd python
          pip install maturin[patchelf]
          maturin develop
          pip install pytest pytest-benchmark hypothesis numpy matplotlib jinja2

      - name: Run performance benchmarks
        run: |
          python benchmarks/performance_benchmark.py

      - name: Upload benchmark results
        uses: actions/upload-artifact@v4
        with:
          name: benchmark-results
          path: benchmarks/results/*.json
          retention-days: 90

      - name: Generate HTML report
        run: |
          python benchmarks/report_generator.py

      - name: Upload HTML report
        uses: actions/upload-artifact@v4
        with:
          name: benchmark-report
          path: benchmarks/results/*.html
          retention-days: 90

      - name: Check for regressions
        run: |
          python benchmarks/regression_detector.py
        continue-on-error: true

      - name: Upload regression report
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: regression-report
          path: benchmarks/results/regression_*.json
          retention-days: 90

      - name: Comment on PR (if triggered by PR)
        if: github.event_name == 'pull_request'
        uses: actions/github-script@v9
        with:
          script: |
            const fs = require('fs');
            const regressionPath = 'benchmarks/results/regression_*.json';
            let comment = '## 🚀 Benchmark Results\n\n';
            
            // Add summary
            comment += 'Benchmarks completed successfully. ';
            comment += 'Check the artifacts for detailed results.\n\n';
            
            // Check for regressions
            try {
              const regressionFiles = require('glob').sync(regressionPath);
              if (regressionFiles.length > 0) {
                const regressionData = JSON.parse(fs.readFileSync(regressionFiles[0], 'utf8'));
                if (regressionData.regressions_detected) {
                  comment += '⚠️ **Regressions Detected**\n\n';
                  regressionData.regressions.forEach(reg => {
                    comment += `- ${reg.language}/${reg.benchmark}: +${reg.percent_change.toFixed(1)}%\n`;
                  });
                } else {
                  comment += '✅ No regressions detected.\n';
                }
              }
            } catch (e) {
              comment += 'Could not check for regressions.\n';
            }
            
            github.rest.issues.createComment({
              issue_number: context.issue.number,
              owner: context.repo.owner,
              repo: context.repo.repo,
              body: comment
            });

  # Separate job for running comparison benchmarks (lighter weight)
  comparison:
    runs-on: ubuntu-latest
    if: github.event_name == 'schedule' || github.event_name == 'workflow_dispatch'
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.12'

      - name: Install Python dependencies
        run: |
          cd python
          pip install maturin[patchelf]
          maturin develop
          pip install ulid-py nanoid ksuid  # Optional comparison libraries

      - name: Run comparison benchmarks
        run: |
          python benchmarks/comparison_benchmark.py

      - name: Upload comparison results
        uses: actions/upload-artifact@v4
        with:
          name: comparison-results
          path: benchmarks/results/comparison_*.json
          retention-days: 90

  # Results retention cleanup
  cleanup:
    runs-on: ubuntu-latest
    if: github.event_name == 'schedule'
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Run results retention
        run: |
          python benchmarks/cleanup_results.py --days 90 --keep-last 10
