# Pre-commit hooks for SNID
# Install: pip install pre-commit
# Run: pre-commit install

repos:
  # Go
  - repo: https://github.com/golangci/golangci-lint
    rev: latest
    hooks:
      - id: golangci-lint
        args: [--config=go/.golangci.yml, --timeout=5m]
        files: \.go$

  - repo: local
    hooks:
      - id: gofmt
        name: gofmt
        entry: gofmt -w
        language: system
        files: \.go$
        pass_filenames: true

  # Rust
  - repo: https://github.com/doublify/pre-commit-rust
    rev: v1.0
    hooks:
      - id: cargo-fmt
        args: [--all, --, --check]
        files: \.rs$
      - id: cargo-clippy
        args: [--all-targets, --all-features, --, -D, warnings]
        files: \.rs$

  # Python
  - repo: https://github.com/astral-sh/ruff-pre-commit
    rev: v0.5.0
    hooks:
      - id: ruff
        args: [--fix]
        files: \.py$
      - id: ruff-format
        files: \.py$

  # General
  - repo: https://github.com/pre-commit/pre-commit-hooks
    rev: v4.6.0
    hooks:
      - id: trailing-whitespace
      - id: end-of-file-fixer
      - id: check-yaml
      - id: check-toml
      - id: check-added-large-files
        args: ['--maxkb=1000']
      - id: check-merge-conflict
      - id: check-case-conflict
      - id: mixed-line-ending
        args: ['--fix=lf']

  # Markdown
  - repo: https://github.com/igorshubovych/markdownlint-cli
    rev: v0.38.0
    hooks:
      - id: markdownlint
        args: [--fix]
        files: \.md$

  # Conformance check (custom)
  - repo: local
    hooks:
      - id: conformance-check
        name: Quick conformance check
        entry: bash -c 'cd conformance/cmd/generate_vectors && go run . --out ../../vectors.json && cd ../../rust && cargo test --quiet && cd ../python && python -m unittest discover -s tests -q'
        language: system
        pass_filenames: false
        always_run: false
